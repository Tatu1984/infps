<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts — loaded async so they don't block first paint.
         The stylesheet is preloaded as a resource, then promoted to a real
         stylesheet via onload. The <noscript> branch keeps the page styled
         for crawlers and JS-disabled browsers. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap">
    </noscript>
    <!-- Minimal critical CSS so the page background and hero text render
         immediately, before the main bundle is parsed. Keeps LCP from
         waiting on the full stylesheet to download. -->
    <style>
      html,body{margin:0;padding:0;background:#080c15;color:#fff;font-family:"Space Grotesk","SF Pro Display",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
    </style>

    <!-- Primary Meta Tags -->
    <title>Enterprise Technology Consulting | Infiniti Tech Partners</title>
    <meta name="title" content="Enterprise Technology Consulting | Infiniti Tech Partners" />
    <meta name="description" content="Ship production-ready software, cloud, security and AI systems without building a 20-person team. Enterprise technology consulting for growth-stage US and UK companies." />
    <meta name="keywords" content="enterprise technology consulting, enterprise software development company, custom software development, application modernization services, cloud engineering consulting, AWS migration consulting, DevOps consulting, SOC 2 compliance consulting, HIPAA compliance software, ISO 27001 consulting, enterprise AI consulting, LLM application development, RAG implementation, AI agent development, fractional engineering team, growth-stage engineering partner, IT consulting firm, IT consultancy UK, software development company London, technology consulting New York" />
    <meta name="author" content="Infiniti Tech Partners" />
    <meta name="geo.region" content="US-GA" />
    <meta name="geo.placename" content="United States, United Kingdom" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.infinititechpartners.com/" />
    <meta property="og:site_name" content="Infiniti Tech Partners" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="en_GB" />
    <meta property="og:title" content="Enterprise Technology Consulting | Infiniti Tech Partners" />
    <meta property="og:description" content="Ship production-ready software, cloud, security and AI systems without building a 20-person team. For growth-stage US and UK companies." />
    <meta property="og:image" content="https://www.infinititechpartners.com/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.infinititechpartners.com/" />
    <meta property="twitter:title" content="Enterprise Technology Consulting | Infiniti Tech Partners" />
    <meta property="twitter:description" content="Ship production-ready software, cloud, security and AI systems without building a 20-person team. For growth-stage US and UK companies." />
    <meta property="twitter:image" content="https://www.infinititechpartners.com/logo.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.infinititechpartners.com/" />

    <!-- Robots -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Structured Data: Organization + ProfessionalService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.infinititechpartners.com/#organization",
          "name": "Infiniti Tech Partners",
          "url": "https://www.infinititechpartners.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://www.infinititechpartners.com/logo.png"
          },
          "description": "Enterprise technology consulting for growth-stage companies. Custom software, cloud infrastructure, cybersecurity and AI engineering — delivered as a fractional team.",
          "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+1-404-689-9006",
            "contactType": "sales",
            "email": "hello@infinititechpartners.com",
            "areaServed": ["US", "GB"],
            "availableLanguage": ["English"]
          },
          "sameAs": [
            "https://www.linkedin.com/company/infinititech-partners",
            "https://github.com/infps"
          ]
        },
        {
          "@type": "ProfessionalService",
          "@id": "https://www.infinititechpartners.com/#service",
          "name": "Infiniti Tech Partners",
          "url": "https://www.infinititechpartners.com",
          "image": "https://www.infinititechpartners.com/logo.png",
          "priceRange": "$$$",
          "areaServed": [
            { "@type": "Country", "name": "United States" },
            { "@type": "Country", "name": "United Kingdom" }
          ],
          "serviceType": [
            "Enterprise Platform Engineering",
            "Cloud Infrastructure Engineering",
            "Security and Compliance Engineering",
            "AI and Intelligent Automation"
          ],
          "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Technology Consulting Services",
            "itemListElement": [
              {
                "@type": "Offer",
                "itemOffered": {
                  "@type": "Service",
                  "name": "Custom Enterprise Software Development",
                  "description": "Web, mobile, and SaaS engineering for growth-stage companies in the US and UK."
                }
              },
              {
                "@type": "Offer",
                "itemOffered": {
                  "@type": "Service",
                  "name": "Cloud and DevOps Consulting",
                  "description": "AWS, Azure, GCP migration, Kubernetes platform engineering, site reliability engineering."
                }
              },
              {
                "@type": "Offer",
                "itemOffered": {
                  "@type": "Service",
                  "name": "Security and Compliance Consulting",
                  "description": "SOC 2, HIPAA, ISO 27001 readiness and penetration testing."
                }
              },
              {
                "@type": "Offer",
                "itemOffered": {
                  "@type": "Service",
                  "name": "AI and LLM Engineering",
                  "description": "RAG applications, AI agents, intelligent process automation."
                }
              }
            ]
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://www.infinititechpartners.com/#website",
          "url": "https://www.infinititechpartners.com",
          "name": "Infiniti Tech Partners",
          "publisher": { "@id": "https://www.infinititechpartners.com/#organization" },
          "inLanguage": "en"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
