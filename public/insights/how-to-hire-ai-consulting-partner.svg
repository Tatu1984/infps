<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080c15"/><stop offset="1" stop-color="#0d1524"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00ffcc"/><stop offset="1" stop-color="#667eea"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.30" r="0.55">
      <stop stop-color="#00ffcc" stop-opacity="0.22"/><stop offset="1" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#ffffff" stroke-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- themed icon chip, right side -->
  <g transform="translate(872 188)">
    <rect x="0" y="0" width="248" height="248" rx="44" fill="#0b1320" stroke="url(#acc)" stroke-width="2" stroke-opacity="0.55"/>
    <rect x="0" y="0" width="248" height="248" rx="44" fill="url(#acc)" fill-opacity="0.05"/>
    <g transform="translate(64 64) scale(1.2)" stroke="url(#acc)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="28" y="28" width="44" height="44" rx="8"/>
      <rect x="42" y="42" width="16" height="16" rx="3"/>
      <path d="M40 28 V16 M60 28 V16 M40 72 V84 M60 72 V84 M28 40 H16 M28 60 H16 M72 40 H84 M72 60 H84"/>
    </g>
  </g>

  <!-- kicker -->
  <rect x="80" y="104" width="56" height="6" rx="3" fill="url(#acc)"/>
  <text x="80" y="160" fill="#00ffcc" font-size="26" font-weight="700" letter-spacing="3" font-family="Space Grotesk, Segoe UI, sans-serif">AI</text>

  <!-- title -->
  <text x="80" y="232" fill="#ffffff" font-size="50" font-weight="700" font-family="Space Grotesk, Segoe UI, sans-serif">How to Hire an AI</text>
  <text x="80" y="294" fill="#ffffff" font-size="50" font-weight="700" font-family="Space Grotesk, Segoe UI, sans-serif">Consulting Partner:</text>
  <text x="80" y="356" fill="#ffffff" font-size="50" font-weight="700" font-family="Space Grotesk, Segoe UI, sans-serif">A Buyer's Guide</text>
  
  <!-- takeaway -->
  <rect x="80" y="438" width="8" height="34" rx="4" fill="url(#acc)"/>
  <text x="104" y="464" fill="#ffffff" fill-opacity="0.72" font-size="28" font-weight="500" font-family="Space Grotesk, Segoe UI, sans-serif">The 3 questions that expose the pretenders.</text>

  <!-- wordmark -->
  <text x="80" y="588" fill="#ffffff" fill-opacity="0.45" font-size="22" font-weight="600" letter-spacing="2" font-family="Space Grotesk, Segoe UI, sans-serif">INFINITI TECH PARTNERS</text>
  <text x="1120" y="588" text-anchor="end" fill="#00ffcc" fill-opacity="0.6" font-size="20" font-weight="500" font-family="Space Grotesk, Segoe UI, sans-serif">infinititechpartners.com</text>
