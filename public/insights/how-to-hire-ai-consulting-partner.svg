<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080c15"/>
      <stop offset="1" stop-color="#0d1524"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00ffcc"/>
      <stop offset="1" stop-color="#667eea"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.6">
      <stop stop-color="#00ffcc" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- emblem chip -->
  <g transform="translate(440 150)">
    <rect x="0" y="0" width="320" height="320" rx="56" fill="#0b1320" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.6"/>
    <rect x="0" y="0" width="320" height="320" rx="56" fill="url(#accent)" fill-opacity="0.05"/>
    <g transform="translate(80 80) scale(1.6)" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <rect x="28" y="28" width="44" height="44" rx="8"/>
<rect x="42" y="42" width="16" height="16" rx="3"/>
<path d="M40 28 V16 M60 28 V16 M40 72 V84 M60 72 V84"/>
<path d="M28 40 H16 M28 60 H16 M72 40 H84 M72 60 H84"/>
    </g>
  </g>

  <!-- category label -->
  <g transform="translate(600 540)" text-anchor="middle" font-family="'Space Grotesk','Segoe UI',sans-serif">
    <text fill="#00ffcc" font-size="30" font-weight="700" letter-spacing="3">AI</text>
    <text y="42" fill="#ffffff" fill-opacity="0.55" font-size="22" font-weight="500" letter-spacing="2">INFINITI TECH PARTNERS</text>
  </g>
</svg>