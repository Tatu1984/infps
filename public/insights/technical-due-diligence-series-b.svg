<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070b13"/><stop offset="0.55" stop-color="#0f0d12"/><stop offset="1" stop-color="#170f0b"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ff8f5e"/><stop offset="1" stop-color="#ff6b35"/></linearGradient>
    <radialGradient id="g1" cx="0.80" cy="0.22" r="0.6"><stop stop-color="#ff6b35" stop-opacity="0.26"/><stop offset="1" stop-color="#ff6b35" stop-opacity="0"/></radialGradient>
    <radialGradient id="g2" cx="0.10" cy="0.95" r="0.7"><stop stop-color="#ff8f5e" stop-opacity="0.14"/><stop offset="1" stop-color="#ff8f5e" stop-opacity="0"/></radialGradient>
    <radialGradient id="panelGlow" cx="0.5" cy="0.3" r="0.8"><stop stop-color="#ff6b35" stop-opacity="0.14"/><stop offset="1" stop-color="#ff6b35" stop-opacity="0"/></radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.05"/></pattern>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ffffff" stop-opacity="0.07"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.012"/></linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <circle cx="930" cy="150" r="430" fill="none" stroke="#ff6b35" stroke-opacity="0.10" stroke-width="1.5"/>
  <circle cx="930" cy="150" r="300" fill="none" stroke="#ff6b35" stroke-opacity="0.07" stroke-width="1.5"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- glass illustration panel: due-diligence checklist + magnifier -->
  <g transform="translate(716 119)">
    <rect x="0" y="0" width="404" height="392" rx="30" fill="url(#glass)" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.45"/>
    <rect x="0" y="0" width="404" height="392" rx="30" fill="url(#panelGlow)"/>
    <g transform="translate(202 196)">
      <rect x="-128" y="-150" width="212" height="276" rx="16" fill="#140d0a" stroke="url(#acc)" stroke-width="2.4"/>
      <rect x="-104" y="-126" width="120" height="14" rx="7" fill="#ffffff" fill-opacity="0.5"/>
      <rect x="-104" y="-100" width="78" height="10" rx="5" fill="#ffffff" fill-opacity="0.22"/>
      <g>
        <circle cx="-92" cy="-56" r="13" fill="url(#acc)" fill-opacity="0.15" stroke="url(#acc)" stroke-width="2"/>
        <path d="M -98 -56 l 4 5 l 8 -10" fill="none" stroke="url(#acc)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="-68" y="-62" width="136" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.32"/>
      </g>
      <g>
        <circle cx="-92" cy="-14" r="13" fill="url(#acc)" fill-opacity="0.15" stroke="url(#acc)" stroke-width="2"/>
        <path d="M -98 -14 l 4 5 l 8 -10" fill="none" stroke="url(#acc)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="-68" y="-20" width="118" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.3"/>
      </g>
      <g>
        <circle cx="-92" cy="28" r="13" fill="url(#acc)" fill-opacity="0.15" stroke="url(#acc)" stroke-width="2"/>
        <path d="M -98 28 l 4 5 l 8 -10" fill="none" stroke="url(#acc)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="-68" y="22" width="128" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.28"/>
      </g>
      <g transform="translate(58 84)">
        <circle cx="0" cy="0" r="50" fill="#140d0a" stroke="url(#acc)" stroke-width="4"/>
        <circle cx="0" cy="0" r="32" fill="url(#acc)" fill-opacity="0.10"/>
        <path d="M -8 0 l 6 7 l 12 -16" fill="none" stroke="url(#acc)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="36" y1="36" x2="78" y2="78" stroke="url(#acc)" stroke-width="10" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <!-- category pill -->
  <g transform="translate(80 96)">
    <rect x="0" y="0" width="198" height="40" rx="20" fill="#ff6b35" fill-opacity="0.12" stroke="#ff6b35" stroke-opacity="0.5" stroke-width="1.2"/>
    <circle cx="22" cy="20" r="4.5" fill="url(#acc)"/>
    <text x="38" y="27" fill="#ff8f5e" font-size="19" font-weight="700" letter-spacing="2.5" font-family="Space Grotesk, Segoe UI, Arial, sans-serif">DUE DILIGENCE</text>
  </g>

  <text x="80" y="206" fill="#ffffff" font-size="50" font-weight="700" letter-spacing="-1" font-family="Space Grotesk, Segoe UI, Arial, sans-serif">Technical Due</text>
  <text x="80" y="266" fill="#ffffff" font-size="50" font-weight="700" letter-spacing="-1" font-family="Space Grotesk, Segoe UI, Arial, sans-serif">Diligence for a</text>
  <text x="80" y="326" fill="#ffffff" font-size="50" font-weight="700" letter-spacing="-1" font-family="Space Grotesk, Segoe UI, Arial, sans-serif">Series B Raise</text>
  <rect x="80" y="352" width="92" height="6" rx="3" fill="url(#acc)"/>
  <text x="80" y="416" fill="#ffffff" fill-opacity="0.7" font-size="24" font-weight="500" font-family="Space Grotesk, Segoe UI, Arial, sans-serif">The CTO checklist investors actually run.</text>

  <line x1="80" y1="556" x2="1120" y2="556" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <g transform="translate(98 584)">
    <path d="M -18 0 C -18 -11 -6 -11 0 0 C 6 11 18 11 18 0 C 18 -11 6 -11 0 0 C -6 11 -18 11 -18 0 Z" fill="none" stroke="url(#acc)" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="128" y="592" fill="#ffffff" fill-opacity="0.6" font-size="21" font-weight="700" letter-spacing="2.5" font-family="Space Grotesk, Segoe UI, Arial, sans-serif">INFINITI TECH PARTNERS</text>
  <text x="1120" y="592" text-anchor="end" fill="#ff6b35" fill-opacity="0.8" font-size="19" font-weight="600" font-family="Space Grotesk, Segoe UI, Arial, sans-serif">infinititechpartners.com</text>
</svg>
